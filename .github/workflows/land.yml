name: Deploy to nuc.land
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: npm ci
      - run: npm run lint
      - run: cp config.land.js config.js
      - run: npm run build
      - run: aws s3 rm s3://graycollar.nuc.land --recursive
      - run: aws s3 cp dist s3://graycollar.nuc.land --recursive
